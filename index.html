<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAND NOTES 26</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6fb;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

header h1{
margin:0;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.card h3{
font-size:14px;
}

.price{
color:#2563eb;
font-weight:bold;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.cart-btn{
position:fixed;
right:15px;
bottom:15px;
background:#2563eb;
color:white;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.cart-count{
background:red;
color:white;
padding:2px 6px;
border-radius:50%;
font-size:12px;
position:absolute;
margin-left:-5px;
}

.cart-modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.cart-box{
background:white;
padding:20px;
width:90%;
max-width:450px;
border-radius:10px;
max-height:90vh;
overflow:auto;
}

input,textarea{
width:100%;
padding:8px;
margin-top:8px;
margin-bottom:8px;
border:1px solid #ccc;
border-radius:6px;
}

.submit-btn{
background:green;
}
</style>
</head>

<body>

<header>
<h1>HAND NOTES 26</h1>
<p>Focus on Learning, Leave the Writing to Me!</p>
<p>Gandhinagar | WhatsApp 73836 36557</p>
</header>

<div class="products" id="products"></div>

<div class="cart-btn" onclick="openCart()">
🛒 <span class="cart-count" id="cartCount">0</span>
</div>

<div class="cart-modal" id="cartModal">
<div class="cart-box">

<h2>Your Cart</h2>
<div id="cartItems"></div>

<h3>Total ₹ <span id="cartTotal">0</span></h3>

<form id="orderForm"
action="https://formspree.io/f/YOUR_FORM_ID"
method="POST">

<input name="Customer Name" placeholder="Your Name" required>
<input name="Phone Number" placeholder="Phone Number" required>
<input type="email" name="Email" placeholder="Email Address" required>
<textarea name="Instructions" placeholder="Special instructions"></textarea>

<input type="hidden" name="Order Summary" id="orderSummary">

<button class="submit-btn">Place Order</button>
</form>

<br>
<button onclick="closeCart()">Close</button>

</div>
</div>

<script>
const products=[
{
name:"Assignment Writing (Per Page)",
price:7,
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"Best handwriting service"
},
{
name:"Assignment With Drawing",
price:9,
img:"https://i.ibb.co/JjwFR84M/Whats-App-Image-2026-03-01-at-10-30-27-AM-1.jpg",
desc:"Diagram included"
},
{
name:"Complete Assignment File",
price:120,
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"Ready to submit"
},
{
name:"Project Writing",
price:200,
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"Full project work"
},
{
name:"Notes Writing",
price:60,
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"Neat notes"
},
{
name:"Homework Writing",
price:50,
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"School homework"
},
{
name:"Practical File",
price:150,
img:"https://i.ibb.co/JjwFR84M/Whats-App-Image-2026-03-01-at-10-30-27-AM-1.jpg",
desc:"Practical work"
},
{
name:"Urgent Assignment",
price:100,
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"Fast delivery"
}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function renderProducts(){
const container=document.getElementById("products");
container.innerHTML="";
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img loading="lazy" src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<div class="price">₹ ${p.price}</div>
<button onclick="addToCart(${i})">Add to Cart</button>
</div>`;
});
}

function addToCart(i){
let item=cart.find(x=>x.name===products[i].name);
if(item) item.qty++;
else cart.push({...products[i],qty:1});
saveCart();
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText=
cart.reduce((a,b)=>a+b.qty,0);
}

function openCart(){
document.getElementById("cartModal").style.display="flex";
renderCart();
}

function closeCart(){
document.getElementById("cartModal").style.display="none";
}

function renderCart(){
let box=document.getElementById("cartItems");
box.innerHTML="";
let total=0;
let summary="";

cart.forEach((item,i)=>{
let sub=item.price*item.qty;
total+=sub;

summary+=`${item.name} | Qty:${item.qty} | ₹${sub}\n`;

box.innerHTML+=`
<div>
${item.name} (₹${item.price}) x ${item.qty}
<button onclick="changeQty(${i},1)">+</button>
<button onclick="changeQty(${i},-1)">-</button>
<button onclick="removeItem(${i})">Remove</button>
</div>
`;
});

document.getElementById("cartTotal").innerText=total;
summary+=`Total ₹ ${total}`;
document.getElementById("orderSummary").value=summary;
}

function changeQty(i,val){
cart[i].qty+=val;
if(cart[i].qty<=0) cart.splice(i,1);
saveCart();
renderCart();
}

function removeItem(i){
cart.splice(i,1);
saveCart();
renderCart();
}

document.getElementById("orderForm").addEventListener("submit",()=>{
localStorage.removeItem("cart");
cart=[];
setTimeout(()=>{
alert("Order placed! We will contact you on WhatsApp.");
},500);
});

renderProducts();
updateCart();
</script>

</body>
</html>
