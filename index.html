<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAND NOTES 26</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
--primary:#2b7cff;
--bg:#f5f7fb;
--dark:#1f2937;
--card:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,Arial;}
body{background:var(--bg);color:#333;}
header{
background:var(--primary);
color:white;
padding:20px;
text-align:center;
}
header h1{font-size:28px;}
header p{opacity:.9}

.hero img{
width:100%;
max-height:280px;
object-fit:cover;
}

.filters{
display:flex;
gap:10px;
overflow:auto;
padding:10px;
background:white;
position:sticky;
top:0;
z-index:10;
}
.filters button{
border:none;
background:#e8eefc;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}
.filters button.active{background:var(--primary);color:white;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:12px;
}
.card{
background:var(--card);
border-radius:14px;
padding:10px;
box-shadow:0 3px 8px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
}
.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}
.card h3{font-size:14px;margin:6px 0;}
.price{font-weight:600;color:var(--primary);}
.card button{
margin-top:auto;
border:none;
background:var(--primary);
color:white;
padding:8px;
border-radius:8px;
cursor:pointer;
}

.cart-btn{
position:fixed;
right:16px;
bottom:16px;
background:var(--primary);
color:white;
padding:14px;
border-radius:50%;
font-size:18px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:50%;
}

.cart-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
padding:10px;
}
.cart-box{
background:white;
width:100%;
max-width:500px;
max-height:90vh;
overflow:auto;
border-radius:14px;
padding:15px;
}
.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}
.qty button{
padding:2px 8px;
}

.checkout{
margin-top:10px;
}

input,textarea{
width:100%;
padding:8px;
margin:6px 0;
border:1px solid #ccc;
border-radius:6px;
}

.submit-btn{
background:green;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:8px;
cursor:pointer;
}

.whatsapp{
position:fixed;
left:16px;
bottom:16px;
background:#25D366;
color:white;
padding:12px 16px;
border-radius:25px;
text-decoration:none;
font-size:14px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}
</style>
</head>

<body>

<header>
<h1>HAND NOTES 26</h1>
<p>Focus on Learning, Leave the Writing to Me!</p>
<p>Gandhinagar | WhatsApp: 73836 36557</p>
</header>

<div class="hero">
<img loading="lazy" src="https://i.ibb.co/S7KhJh0W/Screenshot-2026-03-01-104016.jpg" alt="HAND NOTES 26 banner">
</div>

<div class="filters">
<button class="active" onclick="filterProducts('All')">All</button>
<button onclick="filterProducts('Assignments')">Assignments</button>
<button onclick="filterProducts('Drawing')">Drawing</button>
</div>

<div class="products" id="products"></div>

<div class="cart-btn" onclick="openCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>

<a class="whatsapp" href="https://wa.me/917383636557" target="_blank">Chat on WhatsApp</a>

<div class="cart-modal" id="cartModal">
<div class="cart-box">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: ₹ <span id="cartTotal">0</span></h3>

<form class="checkout" id="orderForm"
action="https://formspree.io/f/YOUR_FORMSPREE_ID"
method="POST">

<input name="Customer Name" placeholder="Your Name" required>
<input name="Phone" placeholder="Phone Number" required>
<input type="email" name="Email" placeholder="Email Address" required>
<textarea name="Instructions" placeholder="Special Instructions"></textarea>

<input type="hidden" name="Order Details" id="orderDetails">

<button class="submit-btn">Place Order</button>
</form>

<br>
<button onclick="closeCart()">Close</button>
</div>
</div>

<script>
const products=[
{
name:"Best Writing Assignments",
price:7,
category:"Assignments",
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"Premium writing delivered on time"
},
{
name:"Assignment With Drawing",
price:9,
category:"Drawing",
img:"https://i.ibb.co/JjwFR84M/Whats-App-Image-2026-03-01-at-10-30-27-AM-1.jpg",
desc:"Neat diagrams and quality notes"
},
{
name:"College Practical File",
price:120,
category:"Assignments",
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"Complete practical writing"
},
{
name:"Engineering Drawing",
price:150,
category:"Drawing",
img:"https://i.ibb.co/JjwFR84M/Whats-App-Image-2026-03-01-at-10-30-27-AM-1.jpg",
desc:"Accurate and clean diagrams"
},
{
name:"Homework Writing",
price:50,
category:"Assignments",
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"School homework support"
},
{
name:"Project File Making",
price:200,
category:"Assignments",
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"Beautiful project preparation"
},
{
name:"Chart Drawing Work",
price:80,
category:"Drawing",
img:"https://i.ibb.co/JjwFR84M/Whats-App-Image-2026-03-01-at-10-30-27-AM-1.jpg",
desc:"Clean chart drawings"
},
{
name:"Notes Writing Service",
price:60,
category:"Assignments",
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg",
desc:"Neat and readable notes"
}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function renderProducts(list){
const container=document.getElementById("products");
container.innerHTML="";
list.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img loading="lazy" src="${p.img}" alt="${p.name}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<div class="price">₹ ${p.price}</div>
<button onclick="addToCart(${i})">Add to Cart</button>
</div>`;
});
}

function filterProducts(cat){
document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
if(cat==="All") renderProducts(products);
else renderProducts(products.filter(p=>p.category===cat));
}

function addToCart(i){
let item=cart.find(c=>c.name===products[i].name);
if(item) item.qty++;
else cart.push({...products[i],qty:1});
saveCart();
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
}

function updateCartCount(){
document.getElementById("cartCount").innerText=
cart.reduce((a,b)=>a+b.qty,0);
}

function openCart(){
document.getElementById("cartModal").style.display="flex";
renderCart();
}

function closeCart(){
document.getElementById("cartModal").style.display="none";
}

function renderCart(){
const box=document.getElementById("cartItems");
box.innerHTML="";
let total=0;
cart.forEach((item,i)=>{
let sub=item.price*item.qty;
total+=sub;
box.innerHTML+=`
<div class="cart-item">
<div>
${item.name}<br>₹${item.price} x ${item.qty}
</div>
<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
<button onclick="changeQty(${i},1)">+</button>
<button onclick="removeItem(${i})">x</button>
</div>
</div>`;
});
document.getElementById("cartTotal").innerText=total;

let summary="";
cart.forEach(i=>{
summary+=`${i.name} | Qty:${i.qty} | ₹${i.price*i.qty}\n`;
});
summary+=`Total: ₹${total}`;
document.getElementById("orderDetails").value=summary;
}

function changeQty(i,val){
cart[i].qty+=val;
if(cart[i].qty<=0) cart.splice(i,1);
saveCart();
renderCart();
}

function removeItem(i){
cart.splice(i,1);
saveCart();
renderCart();
}

document.getElementById("orderForm").addEventListener("submit",function(){
localStorage.removeItem("cart");
cart=[];
setTimeout(()=>{
alert("Order placed! HAND NOTES 26 will contact you on WhatsApp to confirm.");
},500);
});

renderProducts(products);
updateCartCount();
</script>

</body>
</html>
