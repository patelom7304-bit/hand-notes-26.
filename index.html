<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAND NOTES 26</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#2563eb;
font-weight:bold;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px;
border-radius:6px;
width:100%;
cursor:pointer;
}

.cart-btn{
position:fixed;
right:15px;
bottom:15px;
background:#2563eb;
color:white;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.cart-modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.cart-box{
background:white;
padding:20px;
width:90%;
max-width:450px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:8px;
margin:6px 0;
}
</style>
</head>

<body>

<header>
<h1>HAND NOTES 26</h1>
<p>Focus on Learning, Leave the Writing to Me!</p>
<p>WhatsApp 73836 36557</p>
</header>

<div class="products" id="products"></div>

<div class="cart-btn" onclick="openCart()">🛒 <span id="count">0</span></div>

<div class="cart-modal" id="cartModal">
<div class="cart-box">

<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total ₹ <span id="total">0</span></h3>

<form action="https://formspree.io/f/mreavqpb" method="POST">
<input name="Name" placeholder="Your Name" required>
<input name="Phone" placeholder="Phone Number" required>
<input type="email" name="Email" placeholder="Email Address" required>
<textarea name="Order Details" id="orderData"></textarea>

<button>Place Order</button>
</form>

<br>
<button onclick="closeCart()">Close</button>

</div>
</div>

<script>
const products=[
{
name:"Assignment Writing",
price:7,
img:"https://i.ibb.co/GvGysHqX/Whats-App-Image-2026-03-01-at-10-30-27-AM.jpg"
},
{
name:"Assignment With Drawing",
price:9,
img:"https://i.ibb.co/JjwFR84M/Whats-App-Image-2026-03-01-at-10-30-27-AM-1.jpg"
}
];

let cart=[];

function render(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">₹ ${p.price}</div>
<button onclick="add(${i})">Add</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
cart.push(products[i]);
update();
}

function update(){
document.getElementById("count").innerText=cart.length;
}

function openCart(){
document.getElementById("cartModal").style.display="flex";
let list="";
let total=0;

cart.forEach(p=>{
list+=p.name+" - ₹"+p.price+"<br>";
total+=p.price;
});

document.getElementById("cartItems").innerHTML=list;
document.getElementById("total").innerText=total;
document.getElementById("orderData").value=list+" Total ₹"+total;
}

function closeCart(){
document.getElementById("cartModal").style.display="none";
}

render();
</script>

</body>
</html>
